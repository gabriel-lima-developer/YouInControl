services:
  postgres:
    image: postgres:16-alpine
    container_name: youincontrol-postgres
    environment:
      POSTGRES_DB: youincontrol
      POSTGRES_USER: youincontrol
      POSTGRES_PASSWORD: youincontrol
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U youincontrol -d youincontrol"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: YouInControl.Api/Dockerfile
    container_name: youincontrol-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=youincontrol;Username=youincontrol;Password=youincontrol
      Database__ApplyMigrationsOnStartup: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
